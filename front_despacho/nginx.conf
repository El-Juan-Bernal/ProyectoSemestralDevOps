server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Esto es lo importante para React Router: si el navegador pide una ruta
    # que no es un archivo real (ej. /despachos, /login), Nginx no debe
    # devolver 404 - debe devolver index.html y dejar que React Router
    # decida qué mostrar en el navegador.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para archivos estáticos que Vite genera con hash en el nombre
    # (ej. index-a1b2c3.js) - son seguros de cachear por mucho tiempo.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
